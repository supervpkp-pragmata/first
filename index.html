<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Search Bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 20px;
            padding-left: 48px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: #6c63ff;
            background: white;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
        }

        .search-wrapper .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            font-size: 20px;
        }

        #clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            font-size: 18px;
            cursor: pointer;
            display: none;
        }

        #clear-btn:hover {
            color: #dc3545;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .results-header span {
            font-size: 14px;
            color: #6c757d;
        }

        #results-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        #results-list li {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            cursor: default;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #results-list li:last-child {
            border-bottom: none;
        }

        #results-list li:hover {
            background: #f8f9fa;
        }

        .item-name {
            font-weight: 500;
            color: #1a1a2e;
        }

        .item-badge {
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #6c757d;
        }

        .no-results {
            padding: 40px 20px !important;
            text-align: center !important;
            color: #6c757d !important;
            font-style: italic;
            justify-content: center !important;
            cursor: default !important;
        }

        /* Scrollbar Styling */
        #results-list::-webkit-scrollbar {
            width: 6px;
        }

        #results-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }

        #results-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 8px;
        }

        #results-list::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        .stats {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #adb5bd;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 Live Search</h1>
    <p class="subtitle">Search through the list in real-time</p>

    <div class="search-wrapper">
        <span class="icon">🔎</span>
        <input type="text" id="search-input" placeholder="Type to filter items..." autofocus>
        <button id="clear-btn" aria-label="Clear search">✕</button>
    </div>

    <div class="results-header">
        <span id="result-count">Showing all items</span>
    </div>

    <ul id="results-list">
        <!-- Results will be populated here -->
    </ul>

    <div class="stats">
        Powered by vanilla JavaScript
    </div>
</div>

<script>
    // ✅ Data set (you can replace this with your own list)
    const items = [
        { name: 'JavaScript', category: 'Frontend' },
        { name: 'Python', category: 'Backend' },
        { name: 'C', category: 'Systems' },
        { name: 'C++', category: 'Systems' },
        { name: 'Java', category: 'Backend' },
        { name: 'C#', category: 'Backend' },
        { name: 'Ruby', category: 'Backend' },
        { name: 'PHP', category: 'Backend' },
        { name: 'Swift', category: 'Mobile' },
        { name: 'Kotlin', category: 'Mobile' },
        { name: 'Go', category: 'Backend' },
        { name: 'Rust', category: 'Systems' },
        { name: 'TypeScript', category: 'Frontend' },
        { name: 'HTML', category: 'Frontend' },
        { name: 'CSS', category: 'Frontend' },
        { name: 'SQL', category: 'Data' },
        { name: 'Dart', category: 'Mobile' },
        { name: 'Perl', category: 'Scripting' },
        { name: 'Shell', category: 'Scripting' },
        { name: 'PowerShell', category: 'Scripting' }
    ];

    // DOM elements
    const searchInput = document.getElementById('search-input');
    const resultsList = document.getElementById('results-list');
    const resultCount = document.getElementById('result-count');
    const clearBtn = document.getElementById('clear-btn');

    // 🔍 Function to render items
    function renderItems(filteredItems) {
        const count = filteredItems.length;

        if (count === 0) {
            resultsList.innerHTML = `<li class="no-results">😕 No items found. Try a different search.</li>`;
            resultCount.textContent = '0 results';
            return;
        }

        // Build the list HTML
        let html = '';
        filteredItems.forEach(item => {
            html += `
                <li>
                    <span class="item-name">${escapeHtml(item.name)}</span>
                    <span class="item-badge">${escapeHtml(item.category)}</span>
                </li>
            `;
        });

        resultsList.innerHTML = html;
        resultCount.textContent = `Showing ${count} item${count > 1 ? 's' : ''}`;
    }

    // 🧹 Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 🔎 Filter items based on search term
    function filterItems(query) {
        const lowerQuery = query.toLowerCase().trim();
        if (!lowerQuery) {
            // Show all items
            renderItems(items);
            return;
        }

        const filtered = items.filter(item =>
            item.name.toLowerCase().includes(lowerQuery) ||
            item.category.toLowerCase().includes(lowerQuery)
        );

        renderItems(filtered);
    }

    // 🎯 Event listener for search input
    searchInput.addEventListener('input', function() {
        const query = this.value;
        filterItems(query);

        // Show/hide clear button
        clearBtn.style.display = query.length > 0 ? 'block' : 'none';
    });

    // 🧹 Clear search functionality
    clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        filterItems('');
        clearBtn.style.display = 'none';
        searchInput.focus();
    });

    // 🚀 Initial render (show all items)
    renderItems(items);

    // ⌨️ Keyboard shortcut: Escape to clear search
    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            clearBtn.click();
        }
    });

    console.log('✅ Live Search is ready!');
</script>

</body>
</html>
